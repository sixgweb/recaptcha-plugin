{% set recaptcha_passed = __SELF__.getPassed() %}
{% set recaptcha_method = __SELF__.getMethod() %}
{% set recaptcha_size = __SELF__.getSize() %}
{% set recaptcha_theme = __SELF__.getTheme() %}
{% set site_key = __SELF__.getSiteKey() %}

{% if not recaptcha_passed %}
<div id="{{ __SELF__.alias }}RecaptchaContainer" class="{{ __SELF__.property('wrapperClass') }}">
    <div 
        class="g-recaptcha google-recaptcha-v2"
        data-sitekey="{{ site_key }}" 
        data-callback="passedCallback{{ __SELF__.alias }}"
        data-size="{{ recaptcha_size }}" 
        data-theme="{{ recaptcha_theme }}"
        data-alias="{{ __SELF__.alias }}"
    ></div>
</div>
{% endif %}

<script>
var passedCallback{{ __SELF__.alias }} = (token) => {
    oc.ajax('{{ __SELF__.alias ~ '::onCheckRecaptcha' }}', {
        data: {
            'g-recaptcha-response': token
        },
        success: function (data) {
            if (typeof data.recaptchaId != 'undefined') {
                document.getElementById(data.recaptchaId).remove();
            }
            this.success(data);
        },
    });
};
</script>
